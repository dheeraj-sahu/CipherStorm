{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
  <form method="POST" action="/transaction/" class="auth-card">
    <h2 class="auth-heading">💰 Make Transaction</h2>

    <input
      type="number"
      step="0.01"
      min="0"
      max="99999999.99"
      name="amount"
      placeholder="Amount"
      class="auth-input"
      required
    />

    <select name="transaction_type" class="auth-input" required>
      <option value="">Select Transaction Type</option>
      <option value="P2M">P2M (Person to Merchant)</option>
      <option value="P2P">P2P (Person to Person)</option>
    </select>

    <select name="payment_method" class="auth-input" required>
      <option value="">Select Payment Method</option>
      <option value="QR">QR Code</option>
      <option value="Card">Card</option>
    </select>

    <input
      type="text"
      name="recipient_upi_id"
      placeholder="Recipient UPI ID"
      maxlength="50"
      class="auth-input"
      required
    />

    <button type="submit" class="auth-button">Submit Transaction</button>
  </form>
</div>
{% endblock %}
