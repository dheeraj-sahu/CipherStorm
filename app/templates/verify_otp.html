{% extends 'base.html' %}

{% block content %}
<section class="auth-form otp-verification">
  <div class="form-container">
    <h2><i class="fas fa-shield-alt"></i> Verify Your Email</h2>
    <p class="instruction">We’ve sent an OTP to your registered email. Please enter it below to verify your account.</p>

    <form method="POST" action="/auth/verify-otp?email={{ email }}">

      <div class="input-group">
        <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
      </div>

      <button type="submit" class="btn verify-btn">Verify</button>
    </form>

    <p class="resend-note">Didn’t receive the code? <a href="/resend-otp" class="resend-link">Resend OTP</a></p>
  </div>
</section>
{% endblock %}
