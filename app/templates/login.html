{% extends 'base.html' %}

{% block content %}
<section class="auth-container">
  <div class="auth-card">
    <h2 class="auth-heading">🔐 Login to CipherStorm</h2>

    {% if error %}
      <div class="auth-error">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="/auth/login" class="auth-form">
      <input
        type="text"
        name="username"
        placeholder="👤 Username"
        required
        class="auth-input"
      >
      <input
        type="password"
        name="password"
        placeholder="🔒 Password"
        required
        class="auth-input"
      >

      <button type="submit" class="auth-button">Login</button>
    </form>

    <p class="auth-link">
      Don't have an account? <a href="/auth/signup">Sign up</a>
    </p>
  </div>
</section>
{% endblock %}
